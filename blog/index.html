    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f7f5f2;
        --ink: #1a1916;
        --ink-muted: #7a7670;
        --accent: #749b41;
        --rule: #e2ded9;
        --card-bg: #fffefb;
        --font-serif: "DM Serif Display", Georgia, serif;
        --font-mono: "DM Mono", "Courier New", monospace;
        --font-sans: "Pretendard", -apple-system, sans-serif;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-sans);
        font-weight: 300;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      /* NAV */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(247, 245, 242, 0.88);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--rule);
      }
      nav .inner {
        max-width: 1024px;
        margin: 0 auto;
        padding: 0 2rem;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav-logo {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--ink);
        text-decoration: none;
        letter-spacing: -0.02em;
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }
      .nav-links a {
        font-family: var(--font-mono);
        font-size: 0.78rem;
        color: var(--ink-muted);
        text-decoration: none;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--accent);
      }

      /* HEADER */
      .page-header {
        padding: 120px 0 56px;
        border-bottom: 1px solid var(--rule);
        opacity: 0;
        animation: fadeUp 0.6s 0.1s ease forwards;
      }
      .page-label {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 1rem;
      }
      .page-title {
        font-family: var(--font-serif);
        font-size: clamp(2.2rem, 5vw, 3.2rem);
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 1rem;
      }
      .page-desc {
        font-size: 0.97rem;
        color: var(--ink-muted);
        max-width: 420px;
        line-height: 1.75;
      }

      /* FILTER TABS */
      .filter-bar {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        padding: 2rem 0 0;
        opacity: 0;
        animation: fadeUp 0.6s 0.2s ease forwards;
      }
      .filter-btn {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0.3rem 0.85rem;
        border: 1px solid var(--rule);
        border-radius: 2px;
        background: transparent;
        color: var(--ink-muted);
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .filter-btn.active {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--bg);
      }

      /* POST LIST */
      .post-section {
        padding: 3rem 0 5rem;
      }
      .post-count {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 2rem;
      }
      .post-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .post-item {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 1.4rem 1.6rem;
        background: rgb(249, 248, 245);
        border: 1px solid var(--rule);
        border-radius: 4px;
        text-decoration: none;
        color: inherit;
        gap: 1.5rem;
        opacity: 0;
        transform: translateY(16px);
        transition:
          opacity 0.45s ease,
          transform 0.45s ease,
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .post-item.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .post-item:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 20px rgba(116, 155, 65, 0.1);
      }
      .post-item:hover .post-title {
        color: var(--accent);
      }

      .post-left {
        flex: 1;
      }
      .post-tag {
        display: inline-block;
        font-family: var(--font-mono);
        font-size: 0.65rem;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: #3d6b1c;
        background: rgba(116, 155, 65, 0.1);
        padding: 0.18rem 0.6rem;
        border-radius: 2px;
        margin-bottom: 0.6rem;
      }
      .post-title {
        font-family: var(--font-serif);
        font-size: 1.15rem;
        font-weight: 400;
        color: var(--ink);
        line-height: 1.4;
        letter-spacing: 0.02em;
        transition: color 0.2s;
        margin-bottom: 0.45rem;
      }
      .post-excerpt {
        font-size: 0.82rem;
        color: var(--ink-muted);
        line-height: 1.6;
      }
      .post-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.4rem;
        flex-shrink: 0;
      }
      .post-date {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--ink-muted);
        white-space: nowrap;
        letter-spacing: 0.03em;
      }
      .post-read {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        color: var(--rule);
        letter-spacing: 0.04em;
      }

      /* EMPTY STATE */
      .empty-state {
        padding: 3rem 0;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--ink-muted);
        letter-spacing: 0.04em;
        display: none;
      }

      /* FOOTER */
      footer {
        border-top: 1px solid var(--rule);
        padding: 2rem;
      }
      footer .container {
        display: flex;
        justify-content: space-between;
      }
      .footer-copy,
      .footer-made {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--ink-muted);
        letter-spacing: 0.03em;
      }

      /* PAGINATION */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        padding: 2.5rem 0 0;
      }
      .page-btn {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        width: 2rem;
        height: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--rule);
        border-radius: 2px;
        background: transparent;
        color: var(--ink-muted);
        cursor: pointer;
        transition: all 0.2s;
      }
      .page-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .page-btn.active {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--bg);
      }
      .page-btn:disabled {
        opacity: 0.3;
        cursor: default;
        pointer-events: none;
      }
      .page-arrow {
        font-size: 0.85rem;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 600px) {
        .container {
          padding: 0 1.2rem;
        }
        nav .inner {
          padding: 0 1.2rem;
        }
        .post-item {
          flex-direction: column;
          gap: 0.5rem;
        }
        .post-right {
          flex-direction: row;
          align-items: center;
        }
      }
    </style>

        {
          href: "react_25_react_06.html",
          tag: "React",
          title: "React 25. React 06 — Tailwind와 아이콘 라이브러리",

        {

          title: "React 26. React 07 — 컴포넌트와 Props의 이해",
          excerpt:
            "리액트의 핵심 단위인 컴포넌트(Component)의 개념과 데이터 전달 방식인 Props를 학습합니다.",

      // ── 설정 ───────────────────────────────────────────────────
      const PER_PAGE = 5;

      // ── 상태 ───────────────────────────────────────────────────
      let currentFilter = "all";
      let currentPage = 1;

      // ── 날짜 파싱 (YYYY.MM.DD → Date) ─────────────────────────
      function parseDate(str) {
        const [y, m, d] = str.split(".").map(Number);
        return new Date(y, m - 1, d);
      }

      // ── 필터링 + 최신순 정렬 ───────────────────────────────────
      function getFiltered() {
        return POSTS.filter(
          (p) => currentFilter === "all" || p.tag === currentFilter,
        ).sort((a, b) => parseDate(b.date) - parseDate(a.date));
      }

      // ── 포스트 항목 DOM 생성 ───────────────────────────────────
      function createItem(post) {
        const a = document.createElement("a");
        a.className = "post-item";
        a.href = post.href;
        a.dataset.tag = post.tag;
        a.innerHTML = `
          <div class="post-left">
            <p class="post-tag">${post.tag}</p>
            <p class="post-title">${post.title}</p>
            <p class="post-excerpt">${post.excerpt}</p>
          </div>
          <div class="post-right">
            <span class="post-date">${post.date}</span>
          </div>`;
        return a;
      }

      // ── 페이지네이션 버튼 생성 ─────────────────────────────────
      function renderPagination(total) {
        const pag = document.getElementById("pagination");
        pag.innerHTML = "";
        const totalPages = Math.ceil(total / PER_PAGE);
        if (totalPages <= 1) return;

        // 이전 버튼
        const prev = document.createElement("button");
        prev.className = "page-btn page-arrow";
        prev.textContent = "←";
        prev.disabled = currentPage === 1;
        prev.addEventListener("click", () => goTo(currentPage - 1));
        pag.appendChild(prev);

        // 페이지 번호 버튼
        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement("button");
          btn.className = "page-btn" + (i === currentPage ? " active" : "");
          btn.textContent = i;
          btn.addEventListener("click", () => goTo(i));
          pag.appendChild(btn);
        }

        // 다음 버튼
        const next = document.createElement("button");
        next.className = "page-btn page-arrow";
        next.textContent = "→";
        next.disabled = currentPage === totalPages;
        next.addEventListener("click", () => goTo(currentPage + 1));
        pag.appendChild(next);
      }

      // ── 렌더링 ─────────────────────────────────────────────────
      function render() {
        const filtered = getFiltered();
        const total = filtered.length;
        const start = (currentPage - 1) * PER_PAGE;
        const pagePosts = filtered.slice(start, start + PER_PAGE);

        const list = document.getElementById("post-list");
        const countEl = document.getElementById("post-count");
        const emptyEl = document.getElementById("empty-state");

        list.innerHTML = "";
        emptyEl.style.display = total === 0 ? "block" : "none";
        countEl.textContent = `${total} post${total !== 1 ? "s" : ""}`;

        // Intersection Observer (스크롤 reveal)
        const obs = new IntersectionObserver(
          (entries) =>
            entries.forEach((e) => {
              if (e.isIntersecting) e.target.classList.add("visible");
            }),
          { threshold: 0.08 },
        );

        pagePosts.forEach((post) => {
          const el = createItem(post);
          list.appendChild(el);
          obs.observe(el);
        });

        renderPagination(total);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // ── 페이지 이동 ────────────────────────────────────────────
      function goTo(page) {
        currentPage = page;
        render();
      }

      // ── 필터 버튼 이벤트 ───────────────────────────────────────
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          currentPage = 1;
          render();
        });
      });

      // ── 초기 렌더링 ────────────────────────────────────────────
      render();
    </script>
  </body>
