<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects — your.name</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Pretendard:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f7f5f2;
        --ink: #1a1916;
        --ink-muted: #7a7670;
        --accent: #749b41;
        --rule: #e2ded9;
        --card-bg: #fffefb;
        --font-serif: "DM Serif Display", Georgia, serif;
        --font-mono: "DM Mono", "Courier New", monospace;
        --font-sans: "Pretendard", -apple-system, sans-serif;
      }

      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-sans);
        font-weight: 300;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      /* NAV */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: rgba(247, 245, 242, 0.88);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--rule);
      }
      nav .inner {
        max-width: 760px;
        margin: 0 auto;
        padding: 0 2rem;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav-logo {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--ink);
        text-decoration: none;
        letter-spacing: -0.02em;
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }
      .nav-links a {
        font-family: var(--font-mono);
        font-size: 0.78rem;
        color: var(--ink-muted);
        text-decoration: none;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--accent);
      }

      /* PAGE HEADER */
      .page-header {
        padding: 120px 0 56px;
        border-bottom: 1px solid var(--rule);
        opacity: 0;
        animation: fadeUp 0.6s 0.1s ease forwards;
      }
      .page-label {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 1rem;
      }
      .page-title {
        font-family: var(--font-serif);
        font-size: clamp(2.2rem, 5vw, 3.2rem);
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 1rem;
      }
      .page-desc {
        font-size: 0.97rem;
        color: var(--ink-muted);
        max-width: 420px;
        line-height: 1.75;
      }

      /* FILTER */
      .filter-bar {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        padding: 2rem 0 0;
        opacity: 0;
        animation: fadeUp 0.6s 0.2s ease forwards;
      }
      .filter-btn {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0.3rem 0.85rem;
        border: 1px solid var(--rule);
        border-radius: 2px;
        background: transparent;
        color: var(--ink-muted);
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .filter-btn.active {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--bg);
      }

      /* PROJECT SECTION */
      .project-section {
        padding: 3rem 0 5rem;
      }
      .project-count {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 2rem;
      }

      /* PROJECT CARD */
      .project-list {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      .project-card {
        background: var(--card-bg);
        border: 1px solid var(--rule);
        border-radius: 4px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        display: block;
        opacity: 0;
        transform: translateY(16px);
        transition:
          opacity 0.45s ease,
          transform 0.45s ease,
          box-shadow 0.2s,
          border-color 0.2s;
      }
      .project-card.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .project-card:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 20px rgba(116, 155, 65, 0.1);
      }
      .project-card:hover .project-card-title {
        color: var(--accent);
      }

      .project-card-inner {
        padding: 1.8rem 2rem;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 1rem;
        align-items: start;
      }

      .project-card-meta {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
        margin-bottom: 0.8rem;
      }
      .project-tag {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.18rem 0.6rem;
        border-radius: 2px;
      }
      .tag-flutter {
        background: rgba(116, 155, 65, 0.1);
        color: #3d6b1c;
      }
      .tag-python {
        background: rgba(74, 122, 42, 0.1);
        color: #3d6b1c;
      }
      .tag-web {
        background: rgba(26, 25, 22, 0.06);
        color: var(--ink-muted);
      }
      .tag-wip {
        background: rgba(200, 100, 58, 0.1);
        color: #c8643a;
        border: 1px solid rgba(200, 100, 58, 0.2);
      }
      .tag-done {
        background: rgba(116, 155, 65, 0.12);
        color: #3d6b1c;
        border: 1px solid rgba(116, 155, 65, 0.25);
      }

      .project-card-title {
        font-family: var(--font-serif);
        font-size: 1.3rem;
        letter-spacing: -0.01em;
        margin-bottom: 0.5rem;
        line-height: 1.2;
        transition: color 0.2s;
      }
      .project-card-sub {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--accent);
        letter-spacing: 0.04em;
        margin-bottom: 0.6rem;
      }
      .project-card-desc {
        font-size: 0.88rem;
        color: var(--ink-muted);
        line-height: 1.7;
        max-width: 480px;
      }

      .project-card-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.8rem;
        flex-shrink: 0;
      }
      .project-stack {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.3rem;
      }
      .stack-tag {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        letter-spacing: 0.04em;
        color: var(--ink-muted);
        padding: 0.15rem 0.5rem;
        border: 1px solid var(--rule);
        border-radius: 2px;
        background: var(--bg);
      }
      .project-arrow {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--ink-muted);
        transition:
          color 0.2s,
          transform 0.2s;
      }
      .project-card:hover .project-arrow {
        color: var(--accent);
        transform: translateX(3px);
      }

      /* PROJECT CARD FOOTER */
      .project-card-footer {
        padding: 0.9rem 2rem;
        border-top: 1px solid var(--rule);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(247, 245, 242, 0.5);
      }
      .project-links {
        display: flex;
        gap: 1.2rem;
      }
      .project-link {
        font-family: var(--font-mono);
        font-size: 0.68rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-muted);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        transition: color 0.2s;
      }
      .project-link:hover {
        color: var(--accent);
      }
      .project-link svg {
        width: 12px;
        height: 12px;
      }
      .project-date {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        color: var(--ink-muted);
        letter-spacing: 0.04em;
      }

      /* EMPTY */
      .empty-state {
        padding: 3rem 0;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--ink-muted);
        display: none;
      }

      /* FOOTER */
      footer {
        border-top: 1px solid var(--rule);
        padding: 2rem;
      }
      footer .container {
        display: flex;
        justify-content: space-between;
      }
      .footer-copy,
      .footer-made {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--ink-muted);
      }

      /* PAGINATION */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        padding: 2.5rem 0 0;
      }
      .page-btn {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        width: 2rem;
        height: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--rule);
        border-radius: 2px;
        background: transparent;
        color: var(--ink-muted);
        cursor: pointer;
        transition: all 0.2s;
      }
      .page-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .page-btn.active {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--bg);
      }
      .page-btn:disabled {
        opacity: 0.3;
        cursor: default;
        pointer-events: none;
      }
      .page-arrow {
        font-size: 0.85rem;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 600px) {
        .container,
        nav .inner {
          padding: 0 1.2rem;
        }
        .project-card-inner {
          grid-template-columns: 1fr;
        }
        .project-card-right {
          flex-direction: row;
          align-items: center;
        }
        .project-stack {
          flex-direction: row;
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="inner">
        <a class="nav-logo" href="../index.html">your.name</a>
        <ul class="nav-links">
          <li><a href="../index.html#about">About</a></li>
          <li><a href="index.html" class="active">Projects</a></li>
          <li><a href="../blog/index.html">Blog</a></li>
          <li><a href="../index.html#contact">Contact</a></li>
        </ul>
      </div>
    </nav>

    <header class="page-header">
      <div class="container">
        <p class="page-label">Work</p>
        <h1 class="page-title">Projects</h1>
        <p class="page-desc">
          사이드 프로젝트와 학습 결과물을 모아둔 공간입니다.
        </p>
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="Flutter">Flutter</button>
          <button class="filter-btn" data-filter="Python">Python</button>
          <button class="filter-btn" data-filter="Web">Web</button>
        </div>
      </div>
    </header>

    <main class="project-section">
      <div class="container">
        <p class="project-count" id="project-count">1 project</p>
        <div class="project-list" id="project-list"></div>
        <p class="empty-state" id="empty-state">
          해당 카테고리의 프로젝트가 없습니다.
        </p>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>

    <footer>
      <div class="container">
        <span class="footer-copy">© 2026 정서영. All rights reserved.</span>
        <span class="footer-made">Built with HTML & CSS</span>
      </div>
    </footer>

    <script>
      // ── 프로젝트 데이터 ────────────────────────────────────────
      // 새 항목 추가 시 이 배열에만 추가하면 됩니다.
      // date: "YYYY.MM.DD" 형식 (최신순 자동 정렬)
      // links: [{ label, href }] — 없으면 빈 배열
      // stacks: ["Flutter", "Dart", ...]
      // tagClass: "tag-flutter" | "tag-python" | "tag-web"
      // statusClass: "tag-wip" | "tag-done" (없으면 null)
      // disabled: true → Coming Soon 카드
      const PROJECTS = [
        {
          href: "fortune_garden/index.html",
          tag: "Flutter",
          tagClass: "tag-flutter",
          statusLabel: "진행 중",
          statusClass: "tag-wip",
          title: "Fortune Garden",
          sub: "포춘 가든 — 자동 동기화 가계부",
          desc: "본 프로젝트는 2인 가구용 가계부 애플리케이션 개발을 목표로 합니다. 여러 금융기관(시중 은행, 카드사 등)의 거래 내역을 사용자의 로컬 환경에서 외부 서버 전송 없이 안전하게 자산을 관리할 수 있으며, 2인 각자의 계좌를 개별 또는 합산하여 조회할 수 있습니다.",
          stacks: [],
          links: [
            {
              label: "Flutter 기반 애플리케이션 개발 프로젝트",
              href: "fortune_garden/index.html",
            },
          ],
          date: "2026.03.07 ~ ",
        },

        {
          href: "mongle/index.html",
          tag: "React",
          tagClass: "tag-react",
          statusLabel: "진행 중",
          statusClass: "tag-wip",
          title: "몽글 · Mongle",
          sub: "Mongle — 예비 부부 & 웨딩 플래너 협업 AI 플랫폼",
          desc: "Mongle-app은 예비 부부와 웨딩 플래너가 함께 결혼을 준비할 수 있도록 돕는 협업 플랫폼입니다.",
          stacks: [],
          links: [
            {
              label: "React 기반 애플리케이션 개발 프로젝트",
              href: "mongle/index.html",
            },
          ],
          date: "2026.03.23 ~ ",
        },

        {
          href: "Bocca della Verità/index.html",
          tag: "Flutter",
          tagClass: "tag-flutter",
          statusLabel: "진행 중",
          statusClass: "tag-wip",
          title: "진실의 입 · Bocca della Verità",
          sub: "진실의 입 — AI 리뷰 진위 판별 시스템",
          desc: "진실의 입-app은 맛집 블로그 리뷰의 광고성 여부를 AI로 판별하는 맛집 탐색 서비스입니다.",
          stacks: [],
          links: [
            {
              label: "Flutter 기반 애플리케이션 개발 프로젝트",
              href: "Bocca della Verità/index.html",
            },
          ],
          date: "2026.04.20 ~ ",
        },

        {
          href: "#",
          tag: "Python",
          tagClass: "tag-python",
          statusLabel: null,
          statusClass: null,
          title: "다음 프로젝트",
          sub: "Coming Soon",
          desc: "새로운 프로젝트를 준비 중입니다.",
          stacks: ["Python"],
          links: [],
          date: "—",
          disabled: true,
        },
      ];

      // ── 설정 ──────────────────────────────────────────────────
      const PER_PAGE = 5;

      // ── 상태 ──────────────────────────────────────────────────
      let currentFilter = "all";
      let currentPage = 1;

      // ── 날짜 파싱 ─────────────────────────────────────────────
      function parseDate(str) {
        if (str === "—") return new Date(0);
        const [y, m, d] = str.split(".").map(Number);
        return new Date(y, m - 1, d);
      }

      // ── 필터링 + 최신순 정렬 ──────────────────────────────────
      function getFiltered() {
        return PROJECTS.filter(
          (p) => currentFilter === "all" || p.tag === currentFilter,
        ).sort((a, b) => parseDate(b.date) - parseDate(a.date));
      }

      // ── 카드 DOM 생성 ─────────────────────────────────────────
      const SVG_DOC = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;

      function createCard(p) {
        const a = document.createElement("a");
        a.className = "project-card";
        a.href = p.href;
        a.dataset.tag = p.tag;
        if (p.disabled) {
          a.style.pointerEvents = "none";
          a.style.opacity = "0.45";
        }

        const statusBadge = p.statusLabel
          ? `<span class="project-tag ${p.statusClass}">${p.statusLabel}</span>`
          : "";

        const stacksHtml = p.stacks
          .map((s) => `<span class="stack-tag">${s}</span>`)
          .join("\n                  ");

        const linksHtml = p.links
          .map(
            (l) =>
              `<a class="project-link" href="${l.href}">${SVG_DOC} ${l.label}</a>`,
          )
          .join("\n                ");

        a.innerHTML = `
          <div class="project-card-inner">
            <div class="project-card-left">
              <div class="project-card-meta">
                <span class="project-tag ${p.tagClass}">${p.tag}</span>
                ${statusBadge}
              </div>
              <p class="project-card-title">${p.title}</p>
              <p class="project-card-sub">${p.sub}</p>
              <p class="project-card-desc">${p.desc}</p>
            </div>
            <div class="project-card-right">
              <div class="project-stack">${stacksHtml}</div>
              
            </div>
          </div>
          <div class="project-card-footer">
            <div class="project-links">${linksHtml}</div>
            <span class="project-date">${p.date}</span>
          </div>`;
        return a;
      }

      // ── 페이지네이션 렌더 ─────────────────────────────────────
      function renderPagination(total) {
        const pag = document.getElementById("pagination");
        pag.innerHTML = "";
        const totalPages = Math.ceil(total / PER_PAGE);
        if (totalPages <= 1) return;

        const prev = document.createElement("button");
        prev.className = "page-btn page-arrow";
        prev.textContent = "←";
        prev.disabled = currentPage === 1;
        prev.addEventListener("click", () => goTo(currentPage - 1));
        pag.appendChild(prev);

        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement("button");
          btn.className = "page-btn" + (i === currentPage ? " active" : "");
          btn.textContent = i;
          btn.addEventListener("click", () => goTo(i));
          pag.appendChild(btn);
        }

        const next = document.createElement("button");
        next.className = "page-btn page-arrow";
        next.textContent = "→";
        next.disabled = currentPage === totalPages;
        next.addEventListener("click", () => goTo(currentPage + 1));
        pag.appendChild(next);
      }

      // ── 렌더링 ────────────────────────────────────────────────
      function render() {
        const filtered = getFiltered();
        const total = filtered.length;
        const start = (currentPage - 1) * PER_PAGE;
        const pageItems = filtered.slice(start, start + PER_PAGE);

        const list = document.getElementById("project-list");
        const countEl = document.getElementById("project-count");
        const emptyEl = document.getElementById("empty-state");

        list.innerHTML = "";
        emptyEl.style.display = total === 0 ? "block" : "none";
        countEl.textContent = `${total} project${total !== 1 ? "s" : ""}`;

        const obs = new IntersectionObserver(
          (entries) =>
            entries.forEach((e) => {
              if (e.isIntersecting) e.target.classList.add("visible");
            }),
          { threshold: 0.08 },
        );

        pageItems.forEach((p) => {
          const el = createCard(p);
          list.appendChild(el);
          obs.observe(el);
        });

        renderPagination(total);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // ── 페이지 이동 ───────────────────────────────────────────
      function goTo(page) {
        currentPage = page;
        render();
      }

      // ── 필터 이벤트 ───────────────────────────────────────────
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          currentPage = 1;
          render();
        });
      });

      // ── 초기 렌더링 ───────────────────────────────────────────
      render();
    </script>
  </body>
</html>
